name: Repin merged Stitch inventory

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repin:
    if: github.event.pull_request.head.ref == 'feat/workspace-wrapper'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: feat/workspace-wrapper
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Refresh lock
        run: |
          set -euo pipefail
          nix flake lock --accept-flake-config
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git diff --cached --quiet || git commit -m "chore: repin merged Stitch inventory"
          git push origin HEAD:feat/workspace-wrapper
