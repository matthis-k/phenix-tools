name: Normalize workspace wrapper

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.ref == 'feat/workspace-wrapper'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: feat/workspace-wrapper
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Patch and normalize wrapper
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('modules/workspace.nix')
          text = path.read_text()
          old = "while IFS= read -r -d '' value; do"
          new = "while IFS= read -r -d $'\\0' value; do"
          if old not in text:
              raise SystemExit('expected Nix string terminator pattern not found')
          path.write_text(text.replace(old, new))
          PY
          nix shell nixpkgs#nixfmt-rfc-style -c nixfmt flake.nix modules/standalone.nix modules/workspace.nix
          nix flake lock --accept-flake-config
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.nix flake.lock modules/standalone.nix modules/workspace.nix
          git commit -m "chore: normalize workspace wrapper"
          git push origin HEAD:feat/workspace-wrapper
