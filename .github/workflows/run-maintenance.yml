name: Run queued maintenance
on: { pull_request: {} }
permissions: { contents: write }
jobs:
  run:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with: { ref: main, fetch-depth: 0 }
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Execute queued maintenance script
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import subprocess, yaml
          data = yaml.safe_load(open('.github/workflows/finalize-tools-scope.yml'))
          for step in data['jobs']['migrate']['steps']:
              if step.get('run'):
                  subprocess.run(step['run'], shell=True, executable='/bin/bash', check=True)
          PY
      - name: Remove maintenance trigger
        run: |
          set -euo pipefail
          rm -f .github/workflows/run-maintenance.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A && git commit -m "chore: remove temporary maintenance trigger" && git push origin main
