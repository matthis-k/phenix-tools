name: Run queued maintenance
on: { pull_request: {} }
permissions: { contents: write }
jobs:
  run:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with: { ref: main, fetch-depth: 0 }
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Execute queued maintenance script
        run: |
          set -uo pipefail
          rm -f .maintenance-failure.log
          for attempt in $(seq 1 90); do
            flake="$(curl -fsSL https://raw.githubusercontent.com/matthis-k/phenix-stitch/main/flake.nix || true)"
            readme="$(curl -fsSL https://raw.githubusercontent.com/matthis-k/phenix-stitch/main/README.md || true)"
            if [[ "$flake" == *devenv* && "$flake" != *phenix-tend* && "$readme" == *"ordered execution"* ]]; then break; fi
            if (( attempt == 90 )); then echo "scoped Stitch did not converge" | tee .maintenance-failure.log; exit 1; fi
            sleep 30
          done
          cat > /tmp/patch-devenv-inputs.py <<'PY'
          from pathlib import Path
          path = Path("flake.nix")
          text = path.read_text()
          if "devenv-root" not in text:
              marker = "inputs = {"
              index = text.index(marker)
              line_end = text.index("\n", index) + 1
              indent = text[text.rfind("\n", 0, index) + 1:index]
              child = indent + "  "
              addition = (
                  f'{child}devenv-root = {{ url = "file+file:///dev/null"; flake = false; }};\n'
                  f'{child}nix2container = {{\n{child}  url = "github:nlewo/nix2container";\n{child}  inputs.nixpkgs.follows = "nixpkgs";\n{child}}};\n'
                  f'{child}mk-shell-bin.url = "github:rrbutani/nix-mk-shell-bin";\n'
              )
              path.write_text(text[:line_end] + addition + text[line_end:])
          PY
          awk '/^        run: \|$/{capture=1; buf=""; next} capture {line=$0; sub(/^          /,"",line); buf=buf line ORS} END{printf "%s",buf}' .github/workflows/finalize-tools-scope.yml > /tmp/migrate.sh
          sed -i '/^nix flake update$/i python3 /tmp/patch-devenv-inputs.py\ngit add -A' /tmp/migrate.sh
          set +e
          bash /tmp/migrate.sh 2>&1 | tee /tmp/maintenance.log
          status=${PIPESTATUS[0]}
          set -e
          if (( status != 0 )); then
            git reset --hard HEAD
            git clean -fdx
            tail -n 500 /tmp/maintenance.log > .maintenance-failure.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .maintenance-failure.log
            git commit -m "ci: capture tools migration failure"
            git push origin main
            exit "$status"
          fi
      - name: Remove maintenance trigger
        run: |
          set -euo pipefail
          rm -f .github/workflows/run-maintenance.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A && git commit -m "chore: remove temporary maintenance trigger" && git push origin main
