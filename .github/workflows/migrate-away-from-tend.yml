name: Migrate away from Tend

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/migrate-away-from-tend.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Remove Tend and install the Nix-native caretaker stack
        shell: bash
        run: |
          set -euo pipefail

          rm -rf crates/tend crates/tend-cli crates/tend-mcp
          rm -f .tend.json

          cat > Cargo.toml <<'EOF'
          [workspace]
          members = [
            "crates/stitch",
            "crates/stitch-cli",
            "crates/stitch-mcp",
            "crates/phenix-mcp-core",
          ]
          resolver = "2"
          EOF

          cat > flake.nix <<'EOF'
          {
            description = "Phenix cross-repository graph tooling";

            inputs = {
              flake-parts.url = "github:hercules-ci/flake-parts";
              phenix-pins.url = "github:matthis-k/phenix-pins";
              phenix-opencode.url = "github:matthis-k/phenix-opencode";
              nixpkgs.follows = "phenix-pins/nixpkgs";

              devenv = {
                url = "github:cachix/devenv";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              treefmt-nix = {
                url = "github:numtide/treefmt-nix";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              git-hooks = {
                url = "github:cachix/git-hooks.nix";
                inputs.nixpkgs.follows = "nixpkgs";
              };
            };

            outputs = inputs@{ flake-parts, ... }:
              flake-parts.lib.mkFlake { inherit inputs; } {
                systems = [ "x86_64-linux" "aarch64-linux" ];
                imports = [
                  inputs.devenv.flakeModule
                  ./modules/standalone.nix
                ];
                flake.flakeModules.default = import ./modules/flake-module.nix;
              };
          }
          EOF

          cat > modules/flake-module.nix <<'EOF'
          { inputs, ... }: {
            perSystem = { system, ... }: {
              phenixWrapped.stitch = inputs.phenix-tools.packages.${system}.stitch;
            };
          }
          EOF

          cat > modules/standalone.nix <<'EOF'
          { inputs, lib, ... }: {
            perSystem =
              { pkgs, system, ... }:
              let
                source = lib.cleanSource ../.;
                stitchCli = pkgs.rustPlatform.buildRustPackage {
                  pname = "stitch";
                  version = "0.1.0";
                  src = source;
                  cargoLock.lockFile = ../Cargo.lock;
                  cargoBuildFlags = "-p stitch-cli";
                  nativeBuildInputs = [ pkgs.git ];
                };
                stitchMcp = pkgs.rustPlatform.buildRustPackage {
                  pname = "stitch-mcp";
                  version = "0.1.0";
                  src = source;
                  cargoLock.lockFile = ../Cargo.lock;
                  cargoBuildFlags = "-p stitch-mcp";
                  nativeBuildInputs = [ pkgs.git ];
                };
                cargoDeps = stitchCli.cargoDeps or (throw "cargoDeps not found");
                mkCargoCheck = name: command: tools:
                  pkgs.runCommand name {
                    nativeBuildInputs = tools ++ [ pkgs.stdenv.cc ];
                    inherit cargoDeps;
                    src = source;
                  } ''
                    export HOME=$TMPDIR/home
                    export CARGO_HOME=$TMPDIR/cargo
                    export CARGO_TARGET_DIR=$TMPDIR/target
                    mkdir -p "$HOME" "$CARGO_HOME" "$CARGO_TARGET_DIR"
                    cp -rT "$src" source
                    chmod -R u+w source
                    cd source
                    mkdir -p .cargo
                    cat > .cargo/config.toml <<CARGO
                    [source.crates-io]
                    replace-with = "vendored-sources"
                    [source.vendored-sources]
                    directory = "${cargoDeps}"
                    CARGO
                    ${command}
                    touch "$out"
                  '';
              in {
                packages = {
                  stitch = stitchCli;
                  stitchCliPkg = stitchCli;
                  stitch-mcp = stitchMcp;
                  stitchMcpPkg = stitchMcp;
                  default = stitchCli;
                  opencode = inputs.phenix-opencode.packages.${system}.default;
                };

                apps = {
                  stitch = { type = "app"; program = "${stitchCli}/bin/stitch"; };
                  stitch-mcp = { type = "app"; program = "${stitchMcp}/bin/stitch-mcp"; };
                  default = { type = "app"; program = "${stitchCli}/bin/stitch"; };
                  opencode = {
                    type = "app";
                    program = "${inputs.phenix-opencode.packages.${system}.default}/bin/opencode";
                  };
                };

                checks = {
                  cargo-check = mkCargoCheck "phenix-tools-cargo-check"
                    "cargo check --workspace --all-targets"
                    [ pkgs.cargo pkgs.rustc ];
                  cargo-test = mkCargoCheck "phenix-tools-cargo-test"
                    "cargo test --workspace"
                    [ pkgs.cargo pkgs.rustc pkgs.git ];
                  cargo-fmt = mkCargoCheck "phenix-tools-cargo-fmt"
                    "cargo fmt --all --check"
                    [ pkgs.cargo pkgs.rustfmt ];
                  cargo-clippy = mkCargoCheck "phenix-tools-cargo-clippy"
                    "cargo clippy --quiet --workspace --all-targets -- -D warnings"
                    [ pkgs.cargo pkgs.clippy pkgs.rustc ];
                };

                devenv.shells.default = {
                  imports = [ ../devenv.nix ];
                  packages = [
                    stitchCli
                    stitchMcp
                    pkgs.cargo
                    pkgs.rustc
                    pkgs.rustfmt
                    pkgs.clippy
                    pkgs.rust-analyzer
                    pkgs.git
                    pkgs.nix
                    pkgs.statix
                    pkgs.deadnix
                  ];
                };
              };
          }
          EOF

          cat > devenv.nix <<'EOF'
          { lib, ... }:
          let
            caretakerModules = builtins.filter
              (path: builtins.baseNameOf path == "caretaker.nix")
              (lib.filesystem.listFilesRecursive ./.);
          in {
            imports = caretakerModules;

            treefmt = {
              enable = true;
              config.programs = {
                nixfmt.enable = true;
                rustfmt.enable = true;
              };
            };

            git-hooks.hooks = {
              treefmt.enable = true;
              statix.enable = true;
              deadnix.enable = true;
              presentable = {
                enable = true;
                name = "repository presentability";
                entry = "devenv test";
                pass_filenames = false;
                always_run = true;
                stages = [ "pre-push" ];
              };
            };

            enterShell = ''
              echo "phenix-tools development shell"
              echo "  check: devenv test"
              echo "  fix:   devenv tasks run fix"
              echo "  graph: stitch graph verify --workspace . --strict"
            '';
          }
          EOF

          mkdir -p crates modules
          cat > crates/caretaker.nix <<'EOF'
          { ... }: {
            tasks = {
              "check:rust-format" = {
                exec = "cargo fmt --all --check";
                before = [ "devenv:enterTest" ];
              };
              "check:rust-compile" = {
                exec = "cargo check --workspace --all-targets";
                before = [ "devenv:enterTest" ];
              };
              "check:rust-clippy" = {
                exec = "cargo clippy --workspace --all-targets -- -D warnings";
                before = [ "devenv:enterTest" ];
              };
              "check:rust-tests" = {
                exec = "cargo test --workspace";
                before = [ "devenv:enterTest" ];
              };
              "fix:rust-format".exec = "cargo fmt --all";
            };
          }
          EOF

          cat > modules/caretaker.nix <<'EOF'
          { ... }: {
            tasks = {
              "check:format" = {
                exec = "treefmt --fail-on-change";
                before = [ "devenv:enterTest" ];
              };
              "check:statix" = {
                exec = "statix check";
                before = [ "devenv:enterTest" ];
              };
              "check:deadnix" = {
                exec = "deadnix --fail --no-lambda-arg --no-lambda-pattern-names";
                before = [ "devenv:enterTest" ];
              };
              "check:flake" = {
                exec = "nix flake check --print-build-logs --keep-going";
                before = [ "devenv:enterTest" ];
              };
              "fix:format".exec = "treefmt";
              "fix:statix".exec = "statix fix";
              "fix:deadnix".exec = "deadnix --edit --no-lambda-arg --no-lambda-pattern-names";
            };
          }
          EOF

          cat > .github/workflows/ci.yml <<'EOF'
          name: CI
          on:
            pull_request:
            push:
              branches: [main]
          permissions:
            contents: read
          jobs:
            checks:
              runs-on: ubuntu-latest
              timeout-minutes: 60
              steps:
                - uses: actions/checkout@v5
                  with:
                    fetch-depth: 0
                - uses: cachix/install-nix-action@v31
                  with:
                    extra_nix_config: |
                      experimental-features = nix-command flakes
                      accept-flake-config = true
                - name: Verify flake outputs
                  run: nix flake check --print-build-logs --keep-going
                - name: Verify repository presentability
                  run: nix develop --no-pure-eval --command devenv test
          EOF

          nix flake update
          nix develop --no-pure-eval --command cargo generate-lockfile
          nix flake check --print-build-logs --keep-going
          nix develop --no-pure-eval --command devenv test

          rm -f .github/workflows/migrate-away-from-tend.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: replace Tend with devenv caretaker tasks"
          git push
