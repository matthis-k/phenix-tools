name: Publish thin tools source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'refactor/thin-tools-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/thin-tools-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Publish thin aggregation source
        shell: bash
        run: |
          set -euo pipefail

          sed -n '/^        run: |$/,$p' .github/workflows/prepare-thin-tools-pr.yml \
            | tail -n +2 \
            | sed 's/^          //' > /tmp/generate.sh
          sed -i '/^git config user.name github-actions\[bot\]$/,$d' /tmp/generate.sh
          bash /tmp/generate.sh > publication.log 2>&1

          rm -f CRATES.md generator.log
          audit_status=0
          if git grep -niE '(^|[^[:alnum:]_-])tend([^[:alnum:]_-]|$)' \
            -- ':!.github/workflows/**' >> publication.log 2>&1; then
            audit_status=1
          fi
          test ! -d crates || audit_status=1
          test ! -e Cargo.toml || audit_status=1
          test ! -e Cargo.lock || audit_status=1
          if (( audit_status != 0 )); then
            tail -n 300 publication.log
            exit 1
          fi

          git checkout HEAD -- .github/workflows
          rm -f publication.log

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: make phenix-tools a thin aggregator"
          git push origin HEAD:refactor/thin-tools-maintenance
